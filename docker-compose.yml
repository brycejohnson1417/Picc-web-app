name: picc-web-app

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: picc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: picc_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d picc_crm']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: node:22-alpine
    container_name: picc-web
    working_dir: /app
    command: sh -lc "npm ci && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/picc_crm?schema=public
    volumes:
      - ./:/app

volumes:
  postgres_data:
