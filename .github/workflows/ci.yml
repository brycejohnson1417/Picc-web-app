name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  web-checks:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/picc_crm_local?schema=public
      DEMO_MODE: 'true'
      DEMO_ORG_ID: org_picc_demo
      DEMO_USER_ID: demo_user
      TERRITORY_ORG_ID: org_picc_demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify

  migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: picc_crm
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d picc_crm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/picc_crm?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The checked-in migration history starts after the original production
      # baseline, so clean replay is not representative yet. Validate that the
      # current Prisma schema can build a fresh PostGIS database instead.
      - run: npx prisma validate
      - run: echo 'CREATE EXTENSION IF NOT EXISTS postgis;' | npx prisma db execute --schema prisma/schema.prisma --stdin
      - run: npx prisma db push --skip-generate
      - run: npx prisma generate
